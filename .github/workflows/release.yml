name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a tag like "v1.0.0"

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build app
        run: |
          xcodebuild \
            -project Autoclick.xcodeproj \
            -scheme Autoclick \
            -sdk macosx \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip app bundle
        run: |
          APP_PATH=$(find build/Build/Products/Release -name "Autoclick.app" -maxdepth 1 -print -quit)
          if [ -z "$APP_PATH" ]; then echo "Error: Autoclick.app not found"; exit 1; fi
          ditto -c -k --keepParent "$APP_PATH" Autoclick.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Autoclick.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
